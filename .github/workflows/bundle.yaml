name: bundle

on:
  push:
    branches:
      - '**'
    paths-ignore:
      - dist/**
  workflow_dispatch:

permissions:
  actions: read
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}

jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: JesseTG/rm@v1.0.3
        with:
          path: dist

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - run: pnpm install && pnpm build
      - name: Only keep 角色卡示例 in dist for template upstream
        if: github.repository == 'StageDog/tavern_helper_template'
        run: |
          mv dist/角色卡示例 角色卡示例
          rm -rf dist
          mkdir dist
          mv 角色卡示例 dist/
      - name: Remove 示例 in dist for templated repository
        if: github.repository != 'StageDog/tavern_helper_template'
        run: |
          rm -rf dist/角色卡示例 dist/脚本示例 dist/流式楼层界面示例 dist/前端界面示例
      - name: Commit changes
        uses: EndBug/add-and-commit@v9.1.3
        with:
          default_author: github_actions
          message: '[bot] bundle'

      # 自动打版本 tag: <分支名>-v0.0.X, 逢10进位 (0.0.9 -> 0.1.0 -> ... -> 0.9.9 -> 1.0.0)
      - name: Auto tag with branch prefix
        if: github.repository != 'StageDog/tavern_helper_template'
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          PREFIX="${BRANCH}-v"

          # 获取当前分支最新的 tag
          OLD_TAG=$(git tag -l "${PREFIX}*" --sort=-version:refname | head -n 1)

          if [ -z "$OLD_TAG" ]; then
            # 没有旧 tag，从 0.0.1 开始
            NEW_TAG="${PREFIX}0.0.1"
          else
            # 解析版本号
            VERSION="${OLD_TAG#${PREFIX}}"
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f2)
            PATCH=$(echo "$VERSION" | cut -d. -f3)

            # 递增并逢10进位
            PATCH=$((PATCH + 1))
            if [ "$PATCH" -ge 10 ]; then
              PATCH=0
              MINOR=$((MINOR + 1))
            fi
            if [ "$MINOR" -ge 10 ]; then
              MINOR=0
              MAJOR=$((MAJOR + 1))
            fi

            NEW_TAG="${PREFIX}${MAJOR}.${MINOR}.${PATCH}"
          fi

          echo "Old tag: ${OLD_TAG:-none}"
          echo "New tag: ${NEW_TAG}"

          # 创建并推送新 tag
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"

          # 删除旧 tag（如果存在）
          if [ -n "$OLD_TAG" ] && [ "$OLD_TAG" != "$NEW_TAG" ]; then
            git tag -d "$OLD_TAG"
            git push --delete origin "$OLD_TAG"
          fi
